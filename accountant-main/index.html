<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alzein ERP Ultra</title>
    <!-- ربط ملف التنسيقات -->
    <link rel="stylesheet" href="css/style.css">
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <!-- حاوية التطبيق الرئيسية -->
    <div id="app">
        <header class="app-header neon-border">
            <h1>💎 Alzein ERP Ultra</h1>
            <div class="status-badge" id="connection-status">🟢 متصل</div>
        </header>

        <main class="app-content">
            <div class="welcome-card rgb-glow">
                <h2>مرحباً بك في نظام الإدارة السحابي</h2>
                <p>تم تحميل الهيكل بنجاح. جاري تهيئة الوحدات...</p>
            </div>
        </main>

        <!-- زر الحاسبة العائم -->
        <div id="calc-fab" class="fab-center pulse">🧮</div>
    </div>

    <!-- ⚠️ مهم جداً: type="module" لتشغيل نظام الاستيراد الحديث -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
